<!DOCTYPE html>
<html>
<head>
<title>BioSpark Studios</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;600&family=Share+Tech+Mono&display=swap');
  body { margin: 0; overflow: hidden; background: #010a0d; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .bs-viewport {
    min-height: 540px; background: #010a0d; border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; overflow: hidden; font-family: 'Rajdhani', 'Trebuchet MS', sans-serif;
    width: 800px; aspect-ratio: 4/3; max-width: 100vw; max-height: 100vh;
  }
  .circuit-grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(0,230,255,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(0,230,255,0.08) 1px, transparent 1px);
    background-size: 44px 44px;
    animation: gridPulse 6s ease-in-out infinite, gridPan 20s linear infinite;
  }
  @keyframes gridPulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
  @keyframes gridPan { 0%{background-position:0 0} 100%{background-position:44px 44px} }
  .circuit-svg { position:absolute;inset:0;width:100%;height:100%;opacity:0.75; }
  .data-stream { position:absolute;width:1px;background:linear-gradient(180deg,transparent,rgba(0,230,255,0.8),transparent);animation:streamFall linear infinite; }
  @keyframes streamFall { 0%{transform:translateY(-100%);opacity:0} 10%{opacity:1} 90%{opacity:0.6} 100%{transform:translateY(600px);opacity:0} }
  .ds1{height:80px;left:8%;animation-duration:4s;animation-delay:0s}
  .ds2{height:120px;left:22%;animation-duration:6s;animation-delay:1.5s}
  .ds3{height:60px;left:38%;animation-duration:5s;animation-delay:3s}
  .ds4{height:100px;left:62%;animation-duration:4.5s;animation-delay:0.8s}
  .ds5{height:80px;left:78%;animation-duration:5.5s;animation-delay:2.2s}
  .ds6{height:140px;left:92%;animation-duration:3.8s;animation-delay:1.1s}
  .bio-glow { position:absolute;border-radius:50%;filter:blur(60px);animation:bioDrift ease-in-out infinite; }
  @keyframes bioDrift { 0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:0.7;transform:scale(1.1)} }
  .bg1{width:300px;height:200px;background:rgba(0,200,255,0.12);top:5%;left:5%;animation-duration:12s}
  .bg2{width:250px;height:200px;background:rgba(0,180,220,0.1);bottom:10%;right:5%;animation-duration:15s;animation-delay:3s}
  .bg3{width:180px;height:150px;background:rgba(0,230,255,0.08);top:30%;left:25%;animation-duration:10s;animation-delay:6s}
  .radial-mask { position:absolute;inset:0;background:radial-gradient(ellipse 58% 60% at 50% 50%,transparent 20%,#010a0d 80%); }
  .ch-h{position:absolute;top:50%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,230,255,0.2) 30%,rgba(0,230,255,0.2) 70%,transparent);transform:translateY(-50%)}
  .ch-v{position:absolute;left:50%;top:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,rgba(0,230,255,0.2) 30%,rgba(0,230,255,0.2) 70%,transparent);transform:translateX(-50%)}
  .bs-ring{position:absolute;border-radius:50%;animation:bsRipple 4s ease-out infinite}
  .bsr1{width:130px;height:130px;animation-delay:0s;border:1px solid rgba(0,230,255,0.45)}
  .bsr2{width:240px;height:240px;animation-delay:1.3s;border:1px solid rgba(0,230,255,0.25)}
  .bsr3{width:370px;height:370px;animation-delay:2.6s;border:1px solid rgba(0,230,255,0.12)}
  @keyframes bsRipple{0%{transform:scale(0.5);opacity:1}100%{transform:scale(1.6);opacity:0}}
  .bs-seal{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:18px;transform:translateY(-18px);animation:bsReveal 1.8s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;opacity:0}
  @keyframes bsReveal{0%{opacity:0;transform:translateY(calc(-18px + 12px)) scale(0.9)}100%{opacity:1;transform:translateY(-18px) scale(1)}}
  .bs-emblem{width:100px;height:100px;position:relative;display:flex;align-items:center;justify-content:center}
  .hex-outer{position:absolute;width:78px;height:78px;border:1.5px solid rgba(0,230,255,0.7);clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);animation:hexGlow 3s ease-in-out infinite,hexSpin 20s linear infinite}
  @keyframes hexGlow{0%,100%{box-shadow:0 0 14px rgba(0,230,255,0.25);border-color:rgba(0,230,255,0.7)}50%{box-shadow:0 0 35px rgba(0,230,255,0.6);border-color:rgba(0,240,255,1)}}
  @keyframes hexSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .hex-inner{position:absolute;width:50px;height:50px;border:1px solid rgba(0,200,240,0.45);clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);animation:hexSpin 12s linear infinite reverse}
  .hex-arc{position:absolute;width:90px;height:90px;border-radius:50%;border:1px solid transparent}
  .ha1{border-top-color:rgba(0,230,255,0.55);border-right-color:rgba(0,230,255,0.15);animation:hexSpin 8s linear infinite}
  .ha2{border-bottom-color:rgba(255,215,0,0.45);border-left-color:rgba(255,215,0,0.1);animation:hexSpin 8s linear infinite reverse}
  .gold-node{position:absolute;width:7px;height:7px;background:#ffd700;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);box-shadow:0 0 10px #ffd700;animation:nodeFlash 2s ease-in-out infinite}
  .gn-t{top:8px;left:50%;transform:translateX(-50%)}
  .gn-r{right:8px;top:50%;transform:translateY(-50%);animation-delay:0.5s}
  .gn-b{bottom:8px;left:50%;transform:translateX(-50%);animation-delay:1s}
  .gn-l{left:8px;top:50%;transform:translateY(-50%);animation-delay:1.5s}
  @keyframes nodeFlash{0%,100%{opacity:1;box-shadow:0 0 10px #ffd700}50%{opacity:0.4;box-shadow:none}}
  .bs-core{position:absolute;width:20px;height:20px;border-radius:50%;background:radial-gradient(circle,#ffffff,#80f0ff 40%,#00c8e0);box-shadow:0 0 20px #00e6ff,0 0 40px rgba(0,230,255,0.7);animation:corePulse 2s ease-in-out infinite;z-index:2}
  @keyframes corePulse{0%,100%{transform:scale(1);box-shadow:0 0 20px #00e6ff,0 0 40px rgba(0,230,255,0.6)}50%{transform:scale(1.3);box-shadow:0 0 35px #00f0ff,0 0 65px rgba(0,240,255,0.9)}}
  .bs-wordmark{text-align:center;animation:wordIn 1.5s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;opacity:0}
  @keyframes wordIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
  .bs-bio{font-family:'Cinzel','Georgia',serif;font-size:42px;font-weight:700;line-height:1;letter-spacing:0.06em;display:inline;background:linear-gradient(135deg,#80ffff,#00e6ff,#00a8c0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(0,230,255,0.7))}
  .bs-spark{font-family:'Cinzel','Georgia',serif;font-size:42px;font-weight:900;line-height:1;letter-spacing:0.06em;display:inline;color:#ffffff;filter:drop-shadow(0 0 12px rgba(255,255,255,0.5))}
  .bs-studios{font-family:'Rajdhani','Trebuchet MS',sans-serif;font-size:11px;font-weight:300;color:rgba(255,255,255,0.4);letter-spacing:0.65em;text-transform:uppercase;display:block;margin-top:4px}
  .bottom-info{position:absolute;top:75%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:14px;z-index:10;animation:bottomReveal 1s ease 1.1s forwards;opacity:0}
  @keyframes bottomReveal{from{opacity:0;transform:translate(-50%,calc(-50% + 8px))}to{opacity:1;transform:translate(-50%,-50%)}}
  .bs-tagline-row{display:flex;align-items:center;gap:10px}
  .bs-line{height:1px;width:36px;background:linear-gradient(90deg,transparent,rgba(0,230,255,0.45))}
  .bs-line.right{background:linear-gradient(90deg,rgba(0,230,255,0.45),transparent)}
  .bs-tagline{font-size:11px;color:rgba(0,230,255,0.5);letter-spacing:0.3em;text-transform:uppercase}
  .bs-status{display:flex;gap:18px}
  .bss-item{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono','Courier New',monospace;font-size:9px;color:rgba(0,230,255,0.5);letter-spacing:0.1em;text-transform:uppercase}
  .bss-pip{width:5px;height:5px;border-radius:50%;background:#00e6ff;box-shadow:0 0 6px #00e6ff;animation:pipBlink 2s ease-in-out infinite}
  .bss-pip.gold{background:#ffd700;box-shadow:0 0 6px #ffd700;animation-delay:0.7s}
  .bss-pip.dim{background:rgba(0,230,255,0.25);box-shadow:none;animation:none}
  @keyframes pipBlink{0%,100%{opacity:1}50%{opacity:0.3}}
  .bcm{position:absolute;width:22px;height:22px;opacity:0.35}
  .bcm-tl{top:14px;left:14px;border-top:1px solid #00e6ff;border-left:1px solid #00e6ff}
  .bcm-tr{top:14px;right:14px;border-top:1px solid #00e6ff;border-right:1px solid #00e6ff}
  .bcm-bl{bottom:14px;left:14px;border-bottom:1px solid #00e6ff;border-left:1px solid #00e6ff}
  .bcm-br{bottom:14px;right:14px;border-bottom:1px solid #00e6ff;border-right:1px solid #00e6ff}
  .bfrag{position:absolute;font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(0,230,255,0.45);letter-spacing:0.05em;animation:fragDrift 10s ease-in-out infinite;user-select:none}
  @keyframes fragDrift{0%,100%{opacity:0.45;transform:translateY(0) translateX(0) rotate(0deg)}50%{opacity:0.75;transform:translateY(-10px) translateX(5px) rotate(2deg)}}
  .bf1{top:11%;left:5%;animation-delay:0s;animation-duration:12s}
  .bf2{top:19%;right:5%;animation-delay:1.5s;animation-duration:10s}
  .bf3{bottom:21%;left:6%;animation-delay:3s;animation-duration:11s}
  .bf4{bottom:14%;right:5%;animation-delay:2s;animation-duration:9s}
  .bf5{top:58%;left:4%;animation-delay:4s;animation-duration:13s}
  .bf6{top:41%;right:5%;animation-delay:1s;animation-duration:10.5s}
  .bs-version{position:absolute;bottom:18px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.2em;color:rgba(0,230,255,0.25);text-transform:uppercase}

  /* Fade out animation triggered by JS */
  .fade-out { animation: fadeOut 0.8s ease forwards !important; }
  @keyframes fadeOut { to { opacity:0; } }

/* ── Themed scrollbars ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 3px; }
::-webkit-scrollbar-thumb { background: rgba(200,151,58,0.35); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(200,151,58,0.6); }
::-webkit-scrollbar-corner { background: transparent; }
</style>
</head>
<body>
<div class="bs-viewport" id="splash">
  <div class="circuit-grid"></div>
  <div class="bio-glow bg1"></div>
  <div class="bio-glow bg2"></div>
  <div class="bio-glow bg3"></div>
  <svg class="circuit-svg" viewBox="0 0 800 540" preserveAspectRatio="xMidYMid slice">
    <path d="M0,80 L120,80 L140,100 L260,100" fill="none" stroke="rgba(0,230,255,0.5)" stroke-width="1"/>
    <path d="M0,160 L80,160 L100,180 L200,180 L220,160 L340,160" fill="none" stroke="rgba(0,230,255,0.4)" stroke-width="0.8"/>
    <path d="M0,380 L100,380 L120,360 L220,360" fill="none" stroke="rgba(0,230,255,0.45)" stroke-width="1"/>
    <path d="M460,80 L580,80 L600,100 L700,100 L720,80 L800,80" fill="none" stroke="rgba(0,230,255,0.45)" stroke-width="1"/>
    <path d="M480,380 L600,380 L620,400 L800,400" fill="none" stroke="rgba(0,230,255,0.45)" stroke-width="1"/>
    <circle cx="140" cy="100" r="3.5" fill="rgba(0,230,255,0.85)"/>
    <circle cx="120" cy="360" r="3.5" fill="rgba(0,230,255,0.85)"/>
    <circle cx="600" cy="100" r="3.5" fill="rgba(0,230,255,0.85)"/>
    <circle cx="620" cy="400" r="3.5" fill="rgba(0,230,255,0.85)"/>
    <circle cx="260" cy="100" r="4" fill="rgba(255,215,0,0.8)"/>
    <circle cx="480" cy="380" r="4" fill="rgba(255,215,0,0.8)"/>
    <line x1="260" y1="100" x2="340" y2="160" stroke="rgba(255,215,0,0.35)" stroke-width="0.8" stroke-dasharray="4,3"/>
  </svg>
  <div class="data-stream ds1"></div>
  <div class="data-stream ds2"></div>
  <div class="data-stream ds3"></div>
  <div class="data-stream ds4"></div>
  <div class="data-stream ds5"></div>
  <div class="data-stream ds6"></div>
  <div class="radial-mask"></div>
  <div class="ch-h"></div><div class="ch-v"></div>
  <div class="bcm bcm-tl"></div><div class="bcm bcm-tr"></div>
  <div class="bcm bcm-bl"></div><div class="bcm bcm-br"></div>
  <div class="bs-ring bsr1"></div>
  <div class="bs-ring bsr2"></div>
  <div class="bs-ring bsr3"></div>
  <span class="bfrag bf1">BS::GENESIS.INIT</span>
  <span class="bfrag bf2">QUANTUM.BOOT</span>
  <span class="bfrag bf3">CORE::ONLINE</span>
  <span class="bfrag bf4">SEAL::L0.AUTH</span>
  <span class="bfrag bf5">SYS::READY</span>
  <span class="bfrag bf6">SPARK::IGNITE</span>
  <div class="bs-seal">
    <div class="bs-emblem">
      <div class="hex-arc ha1"></div>
      <div class="hex-arc ha2"></div>
      <div class="hex-outer"></div>
      <div class="hex-inner"></div>
      <div class="gold-node gn-t"></div>
      <div class="gold-node gn-r"></div>
      <div class="gold-node gn-b"></div>
      <div class="gold-node gn-l"></div>
      <div class="bs-core"></div>
    </div>
    <div class="bs-wordmark">
      <div><span class="bs-bio">BIO</span><span class="bs-spark">SPARK</span></div>
      <span class="bs-studios">Studios</span>
    </div>
  </div>
  <div class="bottom-info">
    <div class="bs-tagline-row">
      <div class="bs-line"></div>
      <span class="bs-tagline">Quantum Creative Systems</span>
      <div class="bs-line right"></div>
    </div>
    <div class="bs-status">
      <div class="bss-item"><div class="bss-pip"></div>Quill</div>
      <div class="bss-item"><div class="bss-pip gold"></div>Vault</div>
      <div class="bss-item"><div class="bss-pip"></div>Forge</div>
      <div class="bss-item"><div class="bss-pip dim"></div>Loom</div>
      <div class="bss-item"><div class="bss-pip"></div>Atlas</div>
    </div>
  </div>
  <div class="bs-version">BioSpark Studios · Quantum Ecosystem · v2.0</div>
</div>
<script>
  // Tell main process we are ready, and handle dismiss
  if (window.splashBridge) {
    window.splashBridge.ready();
  }
  document.getElementById('splash').addEventListener('click', () => {
    document.getElementById('splash').classList.add('fade-out');
    setTimeout(() => {
      if (window.splashBridge) window.splashBridge.dismiss();
    }, 800);
  });
</script>
</body>
</html>
