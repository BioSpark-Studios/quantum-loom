<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Quantum Loom — Instrument Rack</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Space+Grotesk:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --rack-bg:#0a0a0b; --panel-dark:#111214; --panel-mid:#18191c;
  --panel-hi:#1f2025; --panel-face:#22242a;
  --led-green:#00ff88; --led-amber:#ffaa00; --led-red:#ff3344;
  --led-blue:#00aaff; --led-cyan:#00d4ff; --led-pink:#ff6b9d;
  --solari:#f98f3b; --venturan:#b1d0f0; --fusion:#9b7fd4;
  --totem:#7fd4c8; --blood:#d45b5b; --emerald:#4caf7d; --amber:#e8b84b;
  --fm:'Orbitron',monospace; --fd:'Space Grotesk',sans-serif;
  --fcode:'JetBrains Mono',monospace;
}
@keyframes led-pulse {0%,100%{opacity:.5}50%{opacity:1}}
@keyframes breathe   {0%,100%{opacity:.35}50%{opacity:.9}}
@keyframes rack-slide{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes toast-in  {0%{opacity:0;transform:translateY(8px)}15%,80%{opacity:1;transform:translateY(0)}100%{opacity:0}}
@keyframes wireflow  {0%{stroke-dashoffset:60}100%{stroke-dashoffset:0}}
@keyframes sig-ping  {0%{transform:scale(1);opacity:1}100%{transform:scale(2.6);opacity:0}}
@keyframes pad-flash {0%{filter:brightness(2.5)}100%{filter:brightness(1)}}

body{background:var(--rack-bg);font-family:var(--fd);color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── TOP BAR ── */
#topbar{height:44px;flex-shrink:0;background:rgba(6,6,8,.98);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:300}
.logo{font-family:var(--fm);font-size:.6rem;font-weight:700;letter-spacing:.28em;color:var(--venturan);text-transform:uppercase;display:flex;align-items:center;gap:8px;white-space:nowrap}
.logo-mark{width:22px;height:22px;border:1.5px solid var(--venturan);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.8rem;animation:breathe 4s ease-in-out infinite}
.tb-sep{width:1px;height:18px;background:rgba(255,255,255,.1)}
.tb-tab{font-family:var(--fm);font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;padding:5px 12px;border-radius:3px;border:1px solid transparent;cursor:pointer;transition:all .15s;color:rgba(255,255,255,.3);background:none}
.tb-tab:hover{color:rgba(255,255,255,.6)}
.tb-tab.active{color:var(--solari);border-color:rgba(249,143,59,.3);background:rgba(249,143,59,.06)}
.transport{display:flex;align-items:center;gap:6px;padding:0 10px;border-left:1px solid rgba(255,255,255,.07);border-right:1px solid rgba(255,255,255,.07)}
.t-btn{width:28px;height:28px;border-radius:4px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem;color:rgba(255,255,255,.5);transition:all .15s}
.t-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.t-btn.playing{background:rgba(0,255,136,.12);border-color:rgba(0,255,136,.35);color:var(--led-green);animation:led-pulse 1s ease-in-out infinite}
.t-beat{font-family:var(--fcode);font-size:.72rem;color:var(--led-amber);background:rgba(0,0,0,.5);padding:3px 10px;border-radius:3px;border:1px solid rgba(255,170,0,.2);min-width:56px;text-align:center}
.master-bpm{font-family:var(--fcode);font-size:.65rem;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:4px}
.bpm-val{color:var(--led-amber);font-size:.72rem}
.tb-right{display:flex;align-items:center;gap:7px;margin-left:auto}
.tb-btn{font-family:var(--fm);font-size:.48rem;letter-spacing:.15em;text-transform:uppercase;padding:5px 12px;border-radius:3px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.45);cursor:pointer;transition:all .15s}
.tb-btn:hover{border-color:var(--venturan);color:var(--venturan)}
.tb-btn.hot{background:linear-gradient(135deg,var(--solari),#ffd89e);border-color:var(--solari);color:#1a1200;font-weight:700}
.tb-btn.hot:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(249,143,59,.3)}

/* ── WORKSPACE ── */
#workspace{flex:1;display:flex;overflow:hidden}

/* ── SIDEBAR ── */
#rack-sidebar{width:200px;flex-shrink:0;background:rgba(8,8,10,.98);border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:12px 12px 9px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-title{font-family:var(--fm);font-size:.5rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.unit-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:4px}
.unit-list::-webkit-scrollbar{width:3px}
.unit-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.unit-row{padding:8px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.unit-row:hover{background:rgba(255,255,255,.05)}
.ur-led{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ur-name{font-family:var(--fm);font-size:.53rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ur-sub{font-family:var(--fd);font-size:.57rem;color:rgba(255,255,255,.3)}

/* ── MAIN RACK ── */
#rack-main{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--rack-bg);padding:16px;display:flex;flex-direction:column;gap:0}
#rack-main::-webkit-scrollbar{width:5px}
#rack-main::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}

/* ── RACK UNIT — the outer wrapper must NOT have overflow:hidden so 3D flip works ── */
.rack-unit{
  margin-bottom:8px;
  border-radius:6px;
  /* perspective must be on THIS element, before the flip-card child */
  perspective:1400px;
  /* NO overflow:hidden here — that kills 3D transforms */
  animation:rack-slide .25s ease;
}

/* ── FLIP CARD ── */
.flip-card{
  position:relative;
  width:100%;
  transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.4,0,.2,1);
  /* height is managed by JS on flip */
}
.rack-unit.flipped .flip-card{transform:rotateX(180deg)}
#rack-main.back-mode .flip-card{transform:rotateX(180deg)}

.flip-front, .flip-back{
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  width:100%;
  border-radius:6px;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 2px 12px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.04);
}
.flip-front{
  background:var(--panel-dark);
  position:relative;
}
.flip-back{
  background:#0d0f12;
  /* Must be absolutely positioned and rotated 180deg for the back face */
  position:absolute;
  top:0;left:0;right:0;
  transform:rotateX(180deg);
  border-color:rgba(0,212,255,.18);
  box-shadow:0 2px 12px rgba(0,0,0,.8),inset 0 1px 0 rgba(0,212,255,.04);
}

/* Flip button */
.ru-flip-btn{
  width:24px;height:24px;border-radius:4px;
  border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);
  color:rgba(255,255,255,.35);font-size:.72rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;font-family:var(--fd);
}
.ru-flip-btn:hover{border-color:var(--venturan);color:var(--venturan);background:rgba(177,208,240,.08)}
.rack-unit.flipped .ru-flip-btn{border-color:var(--led-cyan);color:var(--led-cyan);background:rgba(0,212,255,.08)}

/* ── FRONT PANEL PARTS ── */
.ru-head{
  height:38px;background:linear-gradient(180deg,var(--panel-hi),var(--panel-mid));
  border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;padding:0 10px;gap:9px;
  cursor:pointer;user-select:none;position:relative;overflow:hidden;
  border-radius:6px 6px 0 0;
}
.ru-head::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
.ru-power{width:10px;height:10px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:all .15s;border:1px solid rgba(255,255,255,.2)}
.ru-power.on{animation:led-pulse 2.5s ease-in-out infinite}
.ru-label{font-family:var(--fm);font-size:.65rem;font-weight:900;letter-spacing:.16em;text-transform:uppercase;flex:1}
.ru-vu-strip{display:flex;gap:1.5px;align-items:flex-end;height:18px;flex-shrink:0}
.vu-bar{width:3px;border-radius:1px;transition:height .08s ease}
.ru-midi-lbl{font-family:var(--fcode);font-size:.52rem;color:rgba(255,255,255,.22);flex-shrink:0}
.ru-type-badge{font-family:var(--fm);font-size:.42rem;letter-spacing:.2em;text-transform:uppercase;padding:2px 7px;border-radius:2px;border:1px solid;flex-shrink:0}
.ru-collapse{font-size:.65rem;color:rgba(255,255,255,.2);transition:transform .2s;flex-shrink:0;user-select:none}
.rack-unit.expanded .ru-collapse{transform:rotate(180deg)}

.ru-body{
  background:var(--panel-face);
  padding:8px 10px 10px;
  display:flex;flex-direction:row;gap:0;align-items:stretch;
  position:relative;border-radius:0 0 6px 6px;
  border-top:1px solid rgba(255,255,255,.04);
  overflow-x:auto;min-height:80px;
}
.ru-body::-webkit-scrollbar{height:3px}
.ru-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08)}

/* A ctrl-group is a vertical column of controls */
.ctrl-group{
  display:flex;flex-direction:column;gap:4px;align-items:center;
  padding:6px 8px;flex-shrink:0;position:relative;
  border-right:1px solid rgba(255,255,255,.04);
}
.ctrl-group:last-child{border-right:none}
.ctrl-group.dragging-over{background:rgba(255,255,255,.04);border-radius:4px}

/* Drag handle — appears on hover in edit mode */
.ctrl-group-handle{
  position:absolute;top:2px;left:50%;transform:translateX(-50%);
  width:20px;height:6px;cursor:grab;opacity:0;transition:opacity .15s;
  display:flex;flex-direction:column;gap:1.5px;align-items:center;justify-content:center;
}
.ctrl-group-handle span{
  width:12px;height:1px;background:rgba(255,255,255,.3);border-radius:1px;display:block;
}
.ru-body.edit-mode .ctrl-group-handle{opacity:1}
.ru-body.edit-mode .ctrl-group{cursor:grab;padding-top:14px}
.ru-body.edit-mode .ctrl-group:active{cursor:grabbing;opacity:.7}
.ctrl-group.drag-ghost{opacity:.3;border:1px dashed rgba(200,151,58,.4)}

/* Edit mode button in unit header */
.ru-edit-btn{
  font-family:var(--fm);font-size:.28rem;letter-spacing:.1em;text-transform:uppercase;
  padding:1px 5px;border-radius:2px;border:1px solid rgba(255,255,255,.12);
  background:transparent;color:rgba(255,255,255,.25);cursor:pointer;transition:all .15s;
  margin-left:4px;
}
.ru-edit-btn:hover{color:rgba(200,151,58,.7);border-color:rgba(200,151,58,.3)}
.ru-edit-btn.active{color:#c8973a;border-color:rgba(200,151,58,.5);background:rgba(200,151,58,.08)}

/* Signal flow line */
.ru-body::before{
  content:'';position:absolute;left:0;right:0;top:50%;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.04) 20%,rgba(255,255,255,.07) 50%,rgba(255,255,255,.04) 80%,transparent 100%);
  pointer-events:none;z-index:0;
}
.ctrl-group{z-index:1}
.ru-body::-webkit-scrollbar{height:3px}
.ru-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.ru-body::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 3px);pointer-events:none;border-radius:0 0 6px 6px}
.rack-unit.collapsed .ru-body{display:none}

/* ── BACK PANEL ── */
.rb-head{
  height:38px;background:linear-gradient(180deg,#0c0e10,#101214);
  border-bottom:1px solid rgba(0,212,255,.08);
  display:flex;align-items:center;padding:0 10px;gap:9px;
  position:relative;border-radius:6px 6px 0 0;
}
.rb-head::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.14),transparent)}
.rb-label{font-family:var(--fm);font-size:.52rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(0,212,255,.55);flex:1}
.rb-badge{font-family:var(--fm);font-size:.42rem;letter-spacing:.2em;text-transform:uppercase;padding:2px 7px;border-radius:2px;border:1px solid rgba(0,212,255,.2);color:rgba(0,212,255,.45)}
.rb-body{
  display:flex;min-height:160px;border-radius:0 0 6px 6px;
  background:repeating-linear-gradient(0deg,transparent,transparent 19px,rgba(255,255,255,.016) 19px,rgba(255,255,255,.016) 20px);
  position:relative;overflow:hidden;
}
.jack-col{display:flex;flex-direction:column;padding:10px 0}
.jack-col.inputs{width:215px;border-right:1px solid rgba(255,255,255,.04);padding-left:14px}
.jack-col.outputs{width:215px;border-left:1px solid rgba(255,255,255,.04);padding-right:14px;margin-left:auto;align-items:flex-end}
.jack-col-lbl{font-family:var(--fm);font-size:.43rem;letter-spacing:.22em;text-transform:uppercase;padding:0 0 7px;margin-bottom:2px;border-bottom:1px solid rgba(255,255,255,.04)}
.jack-col.inputs  .jack-col-lbl{color:rgba(0,212,255,.4)}
.jack-col.outputs .jack-col-lbl{color:rgba(255,107,157,.4)}
.jack-row{display:flex;align-items:center;gap:8px;padding:5px 0;cursor:crosshair;transition:opacity .15s}
.jack-row.out{flex-direction:row-reverse}
.jack-socket{
  width:16px;height:16px;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 38% 33%,#2c2d31,#0e0f11);
  border:1.5px solid rgba(255,255,255,.15);
  box-shadow:inset 0 1px 3px rgba(0,0,0,.9),0 1px 0 rgba(255,255,255,.04);
  position:relative;transition:all .15s;cursor:crosshair;
}
.jack-socket::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;border-radius:50%;background:#040405;box-shadow:inset 0 1px 2px rgba(0,0,0,.95)}
.jack-socket:hover{border-color:rgba(255,255,255,.4);box-shadow:0 0 10px var(--jack-glow,rgba(0,212,255,.4)),inset 0 1px 3px rgba(0,0,0,.9)}
.jack-socket.connected{border-color:var(--jack-color)!important;box-shadow:0 0 7px var(--jack-color),inset 0 1px 3px rgba(0,0,0,.9)}
/* Compatible/incompatible highlight during patching */
.jack-socket.compatible{
  border-color:var(--led-green)!important;
  box-shadow:0 0 14px rgba(0,255,136,.5),inset 0 1px 3px rgba(0,0,0,.9)!important;
  animation:led-pulse .5s ease-in-out infinite!important;
}
.jack-socket.incompatible{opacity:.25}
.jack-socket.patching-src{border-color:var(--led-amber)!important;animation:led-pulse .45s ease-in-out infinite;box-shadow:0 0 12px var(--led-amber)}
.jack-info{display:flex;flex-direction:column;gap:1px}
.jack-row.out .jack-info{text-align:right}
.jack-name{font-family:var(--fm);font-size:.46rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase}
.jack-type{font-family:var(--fcode);font-size:.43rem;color:rgba(255,255,255,.28)}
.jack-ch{font-family:var(--fcode);font-size:.41rem;color:rgba(255,255,255,.18)}
.rb-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:16px}
/* ── ZONE RACK UNIT ── */
.zone-unit-head{
  padding:8px 12px;
  background:linear-gradient(180deg,var(--panel-hi),var(--panel-mid));
  border-radius:5px 5px 0 0;
  border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;align-items:center;gap:8px;cursor:pointer;
}
.zone-heraldic-strip{
  padding:6px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  background:rgba(0,0,0,.2);border-bottom:1px solid rgba(255,255,255,.04);
  min-height:32px;
}
.zh-chip{
  font-family:var(--fm);font-size:.42rem;letter-spacing:.1em;text-transform:uppercase;
  padding:2px 7px;border-radius:3px;border:1px solid;
  display:flex;align-items:center;gap:4px;cursor:default;
}
.zone-actors-container{
  padding:8px 10px;display:flex;flex-wrap:wrap;gap:6px;
  background:rgba(0,0,0,.15);border-radius:0 0 5px 5px;
  min-height:38px;
  transition:all .2s;
}
.zone-actors-container.hidden{display:none}
.zone-actor-chip{
  font-family:var(--fm);font-size:.46rem;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 9px;border-radius:3px;border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.03);
}
.zone-actor-dot{width:5px;height:5px;border-radius:50%}
.rb-watermark{font-family:var(--fm);font-size:.9rem;font-weight:900;letter-spacing:.3em;text-transform:uppercase;opacity:.03;pointer-events:none;user-select:none;text-align:center;line-height:1.2}
.rb-midi-box{display:flex;flex-direction:column;gap:5px;align-items:center;padding:9px 14px;border:1px solid rgba(255,255,255,.06);border-radius:6px;background:rgba(0,0,0,.4)}
.rb-midi-row{display:flex;align-items:center;gap:6px}
.rb-midi-led{width:7px;height:7px;border-radius:50%;animation:led-pulse 2s ease-in-out infinite;flex-shrink:0}
.rb-midi-txt{font-family:var(--fcode);font-size:.5rem;color:rgba(255,255,255,.22)}
.rb-screws{position:absolute;right:7px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:space-around;pointer-events:none}
.rb-screw{width:8px;height:8px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#3a3b3e,#1a1b1e);border:1px solid rgba(255,255,255,.09)}

/* ── PATCH CABLE OVERLAY ── */
#patch-layer{
  position:fixed;top:44px;left:200px;right:310px;bottom:0;
  pointer-events:none;z-index:400;overflow:visible;
  display:none;
}
#rack-main.back-mode ~ #patch-layer{display:block;}
#patch-layer.active{pointer-events:auto;cursor:crosshair}
.cable-path{fill:none;stroke-width:3;stroke-linecap:round;opacity:.55;filter:drop-shadow(0 1px 3px rgba(0,0,0,.9))}
.cable-temp{fill:none;stroke-width:2;stroke-linecap:round;stroke-dasharray:7 4;opacity:.6;animation:wireflow .6s linear infinite}

/* ── CONTROLS ── */
.ctrl-section{display:flex;flex-direction:column;gap:4px;align-items:center;flex-shrink:0}
.ctrl-sec-label{font-family:var(--fm);font-size:.4rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.2);text-align:center;width:100%}

/* Knob */
.knob-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;cursor:ns-resize;position:relative}
.knob-outer{
  width:32px;height:32px;border-radius:50%;
  background:radial-gradient(circle at 40% 30%,#3a3b3f,#1a1b1e);
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 2px 8px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.06);
  position:relative;display:flex;align-items:center;justify-content:center;
}
.knob-outer:active{box-shadow:0 1px 4px rgba(0,0,0,.9)}
.knob-svg{position:absolute;width:32px;height:32px;top:0;left:0;pointer-events:none}
/* THE FIX: rotor is a full-size overlay that rotates around the knob center.
   The marker is a static child pinned to the bottom of the rotor.
   Rotating the rotor = marker orbits the center correctly. */
.knob-rotor{
  position:absolute;inset:0;
  transform-origin:center center;
  pointer-events:none;
}
.knob-marker{
  position:absolute;top:5px;left:50%;
  transform:translateX(-50%);
  width:3px;height:13px;border-radius:2px;
  /* Color set inline per knob */
}
/* ── INSTRUMENT LAYOUT OPTIONS ── */
.ru-body.layout-half .ctrl-section:nth-child(odd){grid-column:1}
.ru-body.layout-half .ctrl-section:nth-child(even){grid-column:2}
.ru-body/* layout handled by ctrl-group flex columns */
.ru-body/* layout handled by ctrl-group flex columns */
.ru-body/* layout handled by ctrl-group flex columns */
.layout-toggle{
  display:flex;gap:3px;align-items:center;
}
.lt-btn{
  width:20px;height:20px;border-radius:2px;border:1px solid rgba(255,255,255,.1);
  background:transparent;color:rgba(255,255,255,.25);cursor:pointer;font-size:.6rem;
  display:flex;align-items:center;justify-content:center;transition:all .12s;
}
.lt-btn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.6)}
.lt-btn.active{background:rgba(177,208,240,.08);border-color:rgba(177,208,240,.3);color:var(--venturan)}
.knob-label{font-family:var(--fm);font-size:.32rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.45);text-align:center;max-width:64px}
.knob-val{font-family:var(--fcode);font-size:.58rem;text-align:center}
.knob-midi{font-family:var(--fcode);font-size:.44rem;color:rgba(255,255,255,.2);text-align:center}

/* Fader */
.fader-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;height:90px}
.fader-track{flex:1;width:10px;border-radius:5px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.08);position:relative;cursor:ns-resize;box-shadow:inset 0 1px 4px rgba(0,0,0,.8)}
.fader-fill{position:absolute;bottom:0;left:0;right:0;border-radius:5px;transition:height .06s ease}
.fader-thumb{position:absolute;left:-6px;width:18px;height:8px;background:linear-gradient(180deg,#3a3b3f,#25262a);border:1px solid rgba(255,255,255,.15);border-radius:3px;box-shadow:0 2px 6px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.08);cursor:ns-resize;display:flex;align-items:center;justify-content:center}
.fader-groove{width:12px;height:1px;background:rgba(255,255,255,.15);border-radius:1px}
.fader-label{font-family:var(--fm);font-size:.44rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.45);text-align:center;max-width:56px}
.fader-val{font-family:var(--fcode);font-size:.58rem;text-align:center}
.fader-midi{font-family:var(--fcode);font-size:.44rem;color:rgba(255,255,255,.2);text-align:center}
.fader-scale{position:absolute;right:-14px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}
.fader-tick{font-family:var(--fcode);font-size:.38rem;color:rgba(255,255,255,.15);line-height:1}

/* XY Pad */
.xy-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
.xy-pad{width:110px;height:110px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.1);border-radius:6px;position:relative;cursor:crosshair;overflow:hidden;box-shadow:inset 0 2px 8px rgba(0,0,0,.8)}
.xy-pad::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03)1px,transparent 1px);background-size:22px 22px;pointer-events:none}
.xy-ch{position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(255,255,255,.06);pointer-events:none}
.xy-cv{position:absolute;top:0;bottom:0;left:50%;width:1px;background:rgba(255,255,255,.06);pointer-events:none}
.xy-dot{position:absolute;width:14px;height:14px;border-radius:50%;transform:translate(-50%,-50%);border:2px solid rgba(255,255,255,.7);box-shadow:0 0 10px currentColor}
.xy-ripple{position:absolute;width:28px;height:28px;border-radius:50%;transform:translate(-50%,-50%);border:1px solid currentColor;animation:sig-ping .9s ease-out infinite;pointer-events:none}
.xy-axes{display:flex;gap:10px;justify-content:center}
.xy-axis-lbl{font-family:var(--fm);font-size:.4rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.28)}
.xy-label{font-family:var(--fm);font-size:.44rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.4);text-align:center}
.xy-midi{font-family:var(--fcode);font-size:.42rem;color:rgba(255,255,255,.2);text-align:center}

/* Sampler Pads */
.pads-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0}
.pads-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;width:172px}
.pad{aspect-ratio:1;border-radius:4px;border:1px solid rgba(255,255,255,.08);cursor:pointer;transition:all .06s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;position:relative;overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 2px 4px rgba(0,0,0,.6)}
.pad:hover{filter:brightness(1.4)}
.pad.hit{animation:pad-flash .18s ease forwards}
.pad-icon{font-size:.9rem;line-height:1}
.pad-name{font-family:var(--fm);font-size:.36rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.55);text-align:center;line-height:1.2}
.pad-note{font-family:var(--fcode);font-size:.38rem;color:rgba(255,255,255,.2);position:absolute;bottom:2px;right:3px}
.pads-label{font-family:var(--fm);font-size:.44rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.3);text-align:center}
.pads-midi{font-family:var(--fcode);font-size:.42rem;color:rgba(255,255,255,.2);text-align:center}

/* Toggle */
.toggle-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;cursor:pointer}
.toggle-btn{width:50px;height:26px;border-radius:13px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.1);position:relative;transition:all .2s;box-shadow:inset 0 2px 4px rgba(0,0,0,.8)}
.toggle-btn.on{box-shadow:0 0 8px rgba(var(--t-rgb,0,255,136),.25),inset 0 2px 4px rgba(0,0,0,.6)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#4a4b4f,#2a2b2e);border:1px solid rgba(255,255,255,.15);transition:transform .15s ease;box-shadow:0 2px 4px rgba(0,0,0,.8)}
.toggle-btn.on .toggle-thumb{transform:translateX(24px)}
.toggle-label{font-family:var(--fm);font-size:.44rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);text-align:center;max-width:60px}
.toggle-state{font-family:var(--fcode);font-size:.52rem;text-align:center}
.toggle-midi{font-family:var(--fcode);font-size:.42rem;color:rgba(255,255,255,.2);text-align:center}

/* Meter */
.meter-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
.meter-bars{display:flex;gap:2px;align-items:flex-end;height:80px;padding:4px 6px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.m-bar{width:8px;border-radius:1px 1px 0 0;transition:height .1s ease;flex-shrink:0}
.meter-label{font-family:var(--fm);font-size:.44rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.35);text-align:center}
.meter-readout{font-family:var(--fcode);font-size:.55rem;text-align:center}
.meter-h-track{flex:1;height:6px;background:rgba(0,0,0,.5);border-radius:3px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.m-h-bar{height:6px;border-radius:1px;transition:width .15s ease}

/* Sequencer */
.seq-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0}
.seq-steps{display:flex;gap:2px}
.seq-step{width:18px;height:32px;border-radius:3px;border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.5);cursor:pointer;transition:all .1s;position:relative;overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.seq-step.current{border-color:rgba(255,255,255,.5)!important}
.seq-step.current::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.5)}
.seq-label{font-family:var(--fm);font-size:.44rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.35)}
.seq-controls{display:flex;gap:5px;align-items:center}
.seq-btn{width:20px;height:20px;border-radius:3px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);font-size:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);transition:all .12s}
.seq-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.seq-btn.active{background:rgba(0,255,136,.12);border-color:rgba(0,255,136,.3);color:var(--led-green);animation:led-pulse 1s ease-in-out infinite}

/* ── INFO PANEL ── */
#info-panel{width:310px;flex-shrink:0;background:rgba(8,8,10,.98);border-left:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow:hidden}
.ip-head{padding:12px 14px 10px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ip-title{font-family:var(--fm);font-size:.55rem;font-weight:700;letter-spacing:.22em;color:var(--venturan);text-transform:uppercase}
.ip-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.ip-body::-webkit-scrollbar{width:3px}
.ip-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.ip-sec-lbl{font-family:var(--fm);font-size:.48rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.25);padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.05)}
.ip-row{display:flex;align-items:center;justify-content:space-between;padding:3px 0}
.ip-key{font-family:var(--fm);font-size:.44rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.ip-val{font-family:var(--fcode);font-size:.6rem}
.ip-signal{padding:6px 8px;border-radius:4px;border:1px solid;display:flex;align-items:center;gap:7px;animation:rack-slide .15s ease;margin-bottom:3px}
.ip-signal-dot{width:6px;height:6px;border-radius:50%;animation:led-pulse 1s ease-in-out infinite;flex-shrink:0}
.ip-signal-txt{font-family:var(--fd);font-size:.62rem;flex:1}
.ip-signal-time{font-family:var(--fcode);font-size:.52rem;color:rgba(255,255,255,.3)}

/* ── TOAST ── */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:rgba(12,14,18,.98);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(12px);padding:7px 16px;border-radius:6px;font-family:var(--fm);font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;color:var(--venturan);pointer-events:none;opacity:0;z-index:1000;white-space:nowrap}
#toast.show{animation:toast-in 2.5s ease forwards}

/* Signal flow line across panel face */
.ru-body::before {
  content:'';
  position:absolute;
  left:0;right:0;top:50%;
  height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.04) 20%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 80%,transparent 100%);
  pointer-events:none;z-index:0;
}
.ctrl-section { position:relative;z-index:1; }

/* Rack background — less extreme darkness */
#rack-scroll, .rack-scroll, #rack-col, .rack-area { background: var(--rack-bg); }
.rack-unit { margin-bottom:4px; }
.ru-head { height:32px; }

/* ── THEME: all chrome panels track CSS variables ── */
#topbar       { background: var(--rack-bg) !important; }
#rack-sidebar { background: var(--rack-bg) !important; }
#info-panel   { background: var(--rack-bg) !important; }
.flip-back    { background: var(--panel-dark,#0d0f12) !important; }
.rb-body      { background: var(--panel-dark,#0d0f12) !important; }
.ru-head      { background: linear-gradient(180deg,var(--panel-hi,#1f2025),var(--panel-mid,#18191c)) !important; }
.ru-body      { background: var(--panel-face,#22242a) !important; }

/* ── TOOLTIP SYSTEM ── */
[data-tip]{position:relative}
[data-tip]::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 7px);left:50%;
  transform:translateX(-50%) scale(.9);background:rgba(6,8,12,.98);color:var(--venturan);
  font-family:var(--fm);font-size:.42rem;letter-spacing:.12em;text-transform:uppercase;
  white-space:nowrap;padding:4px 10px;border-radius:3px;border:1px solid rgba(177,208,240,.18);
  pointer-events:none;z-index:2000;box-shadow:0 4px 16px rgba(0,0,0,.9);
  opacity:0;transition:opacity .15s,transform .15s}
[data-tip]:hover::after{opacity:1;transform:translateX(-50%) scale(1)}
/* Tooltip below for elements near top edge */
[data-tip-b]::after{bottom:auto;top:calc(100% + 7px)}

/* ── LABEL-FREE CONTROLS (tooltip-first policy) ── */
.knob-label,.fader-label,.pads-label,.toggle-label,.xy-label,.meter-label,
.knob-midi,.fader-midi,.toggle-midi,.xy-midi,.pads-midi{display:none}

/* ── COMPACT BACK PANEL ── */
.jack-row{padding:3px 0;gap:5px}
.jack-sig-lbl{font-family:var(--fm);font-size:.38rem;letter-spacing:.06em;text-transform:uppercase;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:72px;opacity:.7}
.rb-route-grid{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;padding:4px 0}
.rb-mini-sw{width:14px;height:14px;border-radius:3px;border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;position:relative}
.rb-mini-sw:hover{border-color:rgba(255,255,255,.3)}
.rb-mini-sw.on{background:rgba(0,255,136,.12);border-color:rgba(0,255,136,.4)}
.rb-mini-sw .rb-sw-led{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .15s}
.rb-mini-sw.on .rb-sw-led{background:var(--led-green);box-shadow:0 0 5px var(--led-green)}
.rb-type-badge{font-family:var(--fm);font-size:.38rem;letter-spacing:.18em;text-transform:uppercase;
  padding:2px 6px;border-radius:2px;border:1px solid;opacity:.6}

/* ── AI ORB ── */
@keyframes orb-pulse{0%,100%{box-shadow:0 0 12px rgba(177,208,240,.2),0 0 24px rgba(177,208,240,.06)}50%{box-shadow:0 0 22px rgba(177,208,240,.4),0 0 44px rgba(177,208,240,.14)}}
@keyframes orb-idle {0%,100%{transform:scale(1)}50%{transform:scale(.94)}}
#ai-orb-shell{position:fixed;bottom:24px;right:340px;z-index:800;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
#ai-orb{width:42px;height:42px;border-radius:50%;border:1.5px solid rgba(177,208,240,.3);
  background:radial-gradient(circle at 38% 35%,rgba(177,208,240,.12),rgba(6,8,12,.96));
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  animation:orb-pulse 4s ease-in-out infinite,orb-idle 6s ease-in-out infinite;
  transition:border-color .2s,background .2s;flex-shrink:0}
#ai-orb:hover{border-color:var(--venturan)}
#ai-orb.active{border-color:var(--venturan);background:radial-gradient(circle at 38% 35%,rgba(177,208,240,.22),rgba(6,8,12,.96));animation:none}
.orb-core{font-size:.85rem;color:var(--venturan);line-height:1;user-select:none}
#ai-panel{display:none;flex-direction:column;gap:8px;
  width:270px;background:rgba(7,9,13,.98);border:1px solid rgba(177,208,240,.2);
  border-radius:8px;padding:12px;box-shadow:0 8px 32px rgba(0,0,0,.9);
  animation:rack-slide .18s ease}
#ai-panel.open{display:flex}
.ai-panel-head{display:flex;align-items:center;justify-content:space-between}
.ai-panel-title{font-family:var(--fm);font-size:.52rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--venturan)}
.ai-panel-close{width:22px;height:22px;border-radius:4px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.35);cursor:pointer;font-size:.7rem;line-height:1;transition:all .12s}
.ai-panel-close:hover{border-color:var(--blood);color:var(--blood)}
.ai-actions{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.ai-action-btn{font-family:var(--fm);font-size:.38rem;letter-spacing:.09em;text-transform:uppercase;
  padding:5px 7px;border-radius:4px;border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);color:rgba(255,255,255,.5);cursor:pointer;transition:all .14s;text-align:left}
.ai-action-btn:hover{border-color:var(--venturan);color:var(--venturan);background:rgba(177,208,240,.05)}
#ai-input{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);border-radius:4px;
  color:rgba(255,255,255,.8);font-family:var(--fd);font-size:.63rem;padding:7px 9px;
  resize:vertical;min-height:56px;outline:none;transition:border-color .15s}
#ai-input:focus{border-color:rgba(177,208,240,.32)}
.ai-panel-foot{display:flex;align-items:center;justify-content:space-between}
.ai-status{font-family:var(--fcode);font-size:.48rem;color:rgba(255,255,255,.3)}
.ai-send-btn{font-family:var(--fm);font-size:.42rem;letter-spacing:.14em;text-transform:uppercase;
  padding:5px 11px;border-radius:3px;border:1px solid rgba(177,208,240,.28);
  background:rgba(177,208,240,.07);color:var(--venturan);cursor:pointer;transition:all .14s}
.ai-send-btn:hover{background:rgba(177,208,240,.14);box-shadow:0 0 10px rgba(177,208,240,.18)}
.ai-output{font-family:var(--fd);font-size:.6rem;color:rgba(255,255,255,.68);line-height:1.55;
  max-height:130px;overflow-y:auto;padding:7px 9px;background:rgba(0,0,0,.4);
  border-radius:4px;border:1px solid rgba(255,255,255,.06);display:none;white-space:pre-wrap}
.ai-output:not(:empty){display:block}
.ai-output.streaming{border-color:rgba(177,208,240,.18)}

/* ── Themed scrollbars ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 3px; }
::-webkit-scrollbar-thumb { background: rgba(200,151,58,0.35); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(200,151,58,0.6); }
::-webkit-scrollbar-corner { background: transparent; }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo"><div class="logo-mark">⬡</div>Quantum Loom</div>
  <div class="tb-sep"></div>
  <button class="tb-tab" onclick="navTo('ionodes')">◈ Node Graph</button>
  <button class="tb-tab" onclick="navTo('subgraph')">⟁ Sub-Graph</button>
  <button class="tb-tab active" onclick="navTo('rack')">⚙ Instrument Rack</button>
  <div class="tb-sep"></div>
  <div class="transport">
    <button class="t-btn" id="t-stop" onclick="stopPlayback()">■</button>
    <button class="t-btn" id="t-play" onclick="togglePlay()">▶</button>
    <div class="t-beat" id="t-beat">01.01.000</div>
    <div class="master-bpm">BPM <span class="bpm-val" id="bpm-val">120</span></div>
    <input type="range" min="60" max="200" value="120" style="width:60px;accent-color:var(--led-amber)" oninput="setBPM(this.value)">
  </div>
  <div class="tb-right">
    <button class="tb-btn" id="backpanel-btn" onclick="toggleBackPanel()">⟲ Back Panel</button>
    <button class="tb-btn" onclick="toast('Promote — right-click any sub-graph node to assign a rack control')">+ Promote</button>
    <button class="tb-btn" onclick="toast('MIDI Map — Web MIDI API binding ready for v2')">MIDI Map</button>
    <button class="tb-btn hot" onclick="fireDemoSignals()">⚡ Performance Mode</button>
  </div>
</div>

<div id="workspace">
  <div id="rack-sidebar">
    <div class="sb-head">
      <div class="sb-title">Rack Units</div>
    </div>
    <div class="unit-list" id="unit-list"></div>
  </div>

  <div id="rack-main"></div>

  <div id="info-panel">
    <div class="ip-head">
      <div class="ip-title">Live State</div>
      <div id="sig-count" style="font-family:var(--fm);font-size:.44rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.2)">0 signals</div>
    </div>
    <div class="ip-body" id="ip-body">
      <div style="font-family:var(--fd);font-size:.67rem;color:rgba(255,255,255,.35);line-height:1.6;padding:8px 10px;background:rgba(255,255,255,.03);border-radius:6px;border-left:2px solid var(--venturan)">
        <b style="color:var(--venturan)">⟲ Back Panel</b> in the toolbar flips the entire rack. Drag output jacks (right) to compatible input jacks (left) to patch. Right-click a cable to remove it.
      </div>
    </div>
  </div>
</div>

<!-- Patch cable SVG layer — sits above the rack, below modals -->
<svg id="patch-layer" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cable-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g id="cables-permanent"></g>
  <path id="cable-temp" class="cable-temp" style="display:none"/>
</svg>

<!-- ── AI ORB — Loom AI floating assistant ── -->
<div id="ai-orb-shell">
  <div id="ai-panel">
    <div class="ai-panel-head">
      <div class="ai-panel-title">◈ Loom AI</div>
      <button class="ai-panel-close" onclick="toggleAIPanel()">✕</button>
    </div>
    <div class="ai-actions">
      <button class="ai-action-btn" onclick="aiAction('fill')">📝 Fill Form</button>
      <button class="ai-action-btn" onclick="aiAction('plot')">💡 Plot Ideas</button>
      <button class="ai-action-btn" onclick="aiAction('glyph')">⬡ Gen Glyph</button>
      <button class="ai-action-btn" onclick="aiAction('arc')">↗ Arc Develop</button>
    </div>
    <textarea id="ai-input" placeholder="Ask about your story, rack state, or world…"></textarea>
    <div class="ai-panel-foot">
      <div id="ai-status" class="ai-status">Ready</div>

/* Global back-panel mode — flips entire rack at once (Reason-style) */
let rackBackMode = false;
function toggleBackPanel() {
  rackBackMode = !rackBackMode;
  const rack = document.getElementById('rack-main');
  const btn  = document.getElementById('backpanel-btn');
  const pl   = document.getElementById('patch-layer');
  if (rackBackMode) {
    rack.classList.add('back-mode');
    btn.classList.add('hot');
    btn.textContent = '⟲ Front Panel';
    pl.style.display = 'block';
    setTimeout(rebuildCables, 580);
    toast('⟲ BACK PANEL — drag output jacks → input jacks. ESC or button to exit');
  } else {
    rack.classList.remove('back-mode');
    btn.classList.remove('hot');
    btn.textContent = '⟲ Back Panel';
    pl.style.display = 'none';   // always hide cables in front mode
    setTimeout(rebuildCables, 580);
    toast('⟲ Front panel');
  }
}
/* Keep individual flipUnit for backwards compat — now just triggers global mode */
function flipUnit(e, id) {
  e.stopPropagation();
  toggleBackPanel();
}

function toggleCollapse(id) {
  const unit = document.getElementById('unit-' + id);
  if (unit.classList.contains('flipped')) return; // don't collapse while flipped
  unit.classList.toggle('collapsed');
  unit.classList.toggle('expanded');
}

function togglePower(e, id) {
  e.stopPropagation();
  const btn = e.currentTarget;
  btn.classList.toggle('on');
  toast((btn.classList.contains('on') ? '◉ ' : '○ ') + id.toUpperCase() + (btn.classList.contains('on') ? ' on' : ' off'));
}

/* ═══ CONTROLS ════════════════════════════════════════ */

/* ── Control group order — persisted per unit ───────────── */
const groupOrder = {};   /* unitId → [groupIndex, ...] */

function getGroups(u) {
  /* Auto-cluster: runs of knob/toggle become one group; each large type is its own group */
  const SMALL = new Set(['knob','toggle']);
  const groups = [];
  let cur = null;
  u.controls.forEach(c => {
    if (SMALL.has(c.type)) {
      if (!cur || cur.large) { cur = { large:false, controls:[] }; groups.push(cur); }
      cur.controls.push(c);
    } else {
      cur = { large:true, controls:[c] };
      groups.push(cur);
      cur = null;
    }
  });
  /* Apply saved order if it exists and lengths match */
  const ord = groupOrder[u.id];
  if (ord && ord.length === groups.length) return ord.map(i => groups[i]);
  return groups;
}

function buildControls(u) {
  const body = document.getElementById('body-' + u.id);
  if (!body) return;
  body.innerHTML = '';

  const groups = getGroups(u);
  groups.forEach((grp, gi) => {
    const col = document.createElement('div');
    col.className = 'ctrl-group';
    col.dataset.uid = u.id;
    col.dataset.gi  = gi;

    /* Drag handle */
    col.innerHTML = '<div class="ctrl-group-handle" title="Drag to reorder"><span></span><span></span></div>';

    /* Controls inside this group */
    grp.controls.forEach(ctrl => {
      const sec = document.createElement('div');
      sec.className = 'ctrl-section';
      sec.innerHTML = ctrlHTML(u, ctrl);
      col.appendChild(sec);
      attachEvents(u, ctrl, sec);
    });

    /* Drag-to-reorder */
    col.draggable = false;   /* only active in edit mode */
    col.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', JSON.stringify({ uid: u.id, gi }));
      col.classList.add('drag-ghost');
    });
    col.addEventListener('dragend', () => col.classList.remove('drag-ghost'));
    col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('dragging-over'); });
    col.addEventListener('dragleave', () => col.classList.remove('dragging-over'));
    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('dragging-over');
      try {
        const { uid, gi: fromGi } = JSON.parse(e.dataTransfer.getData('text/plain'));
        if (uid !== u.id || fromGi === gi) return;
        const grps = getGroups(u);
        const ord  = grps.map((_,i) => i);
        const [moved] = ord.splice(fromGi, 1);
        ord.splice(gi, 0, moved);
        groupOrder[u.id] = ord;
        buildControls(u);   /* re-render with new order */
      } catch(err) {}
    });

    body.appendChild(col);
  });
}

/* Arc math for knob SVG */
function arcPaths(angle) {
  const r=13, cx=16, cy=16;
  const toRad = a => (a-90)*Math.PI/180;
  const startA = toRad(-145), endA = toRad(angle);
  const trackEndA = toRad(145);
  const pt = a => ({x:cx+r*Math.cos(a), y:cy+r*Math.sin(a)});
  const arcStr = (a1, a2, large) => {
    const s=pt(a1),e=pt(a2);
    return `M${s.x.toFixed(2)},${s.y.toFixed(2)} A${r},${r} 0 ${large},1 ${e.x.toFixed(2)},${e.y.toFixed(2)}`;
  };
  const span = angle - (-145);
  return {
    pathD:  arcStr(startA, endA,  span>180?1:0),
    trackD: arcStr(startA, trackEndA, 1),
  };
}

/* ═══ ATTACH EVENTS ═══════════════════════════════════ */

function attachEvents(u, c, sec) {
  if (c.type === 'knob') {
    const w = sec.querySelector('.knob-wrap');
    if (!w) return;
    let sy, sv;
    w.addEventListener('mousedown', e => {
      sy=e.clientY; sv=SG[u.id][c.id]??c.min;
      const onMove = e2 => {
        const nv = Math.min(c.max, Math.max(c.min, sv+(sy-e2.clientY)*(c.max-c.min)/150));
        setValue(u, c, nv);
      };
      const onUp = () => { window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp); };
      window.addEventListener('mousemove',onMove); window.addEventListener('mouseup',onUp);
      e.preventDefault();
    });
    w.addEventListener('wheel', e => {
      const v = SG[u.id][c.id]??c.min;
      setValue(u, c, Math.min(c.max, Math.max(c.min, v + (-e.deltaY*(c.max-c.min)/600))));
      e.preventDefault();
    }, {passive:false});
  }

  if (c.type === 'fader') {
    const track = sec.querySelector('.fader-track');
    if (!track) return;
    const drag = e => {
      const r = track.getBoundingClientRect();
      const pct = 1 - Math.min(1,Math.max(0,(e.clientY-r.top)/r.height));
      setValue(u, c, c.min + pct*(c.max-c.min));
    };
    track.addEventListener('mousedown', e => {
      drag(e);
      const onMove=e2=>drag(e2);
      const onUp=()=>{ window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp); };
      window.addEventListener('mousemove',onMove); window.addEventListener('mouseup',onUp);
      e.preventDefault();
    });
    track.addEventListener('wheel', e => {
      const v=SG[u.id][c.id]??0;
      setValue(u,c,Math.min(c.max,Math.max(c.min,v+(-e.deltaY*(c.max-c.min)/400))));
      e.preventDefault();
    },{passive:false});
  }

  if (c.type === 'xy') {
    const pad = sec.querySelector('.xy-pad');
    if (!pad) return;
    const move = e => {
      const r=pad.getBoundingClientRect();
      const xv=Math.min(100,Math.max(0,((e.clientX-r.left)/r.width)*100));
      const yv=Math.min(100,Math.max(0,(1-(e.clientY-r.top)/r.height)*100));
      SG[u.id][c.xKey]=xv; SG[u.id][c.yKey]=yv;
      const px=(xv/100)*110, py=(1-yv/100)*110;
      const dot=document.getElementById(`xyd-${u.id}-${c.id}`);
      const rip=document.getElementById(`xyr-${u.id}-${c.id}`);
      const xEl=document.getElementById(`xyx-${u.id}-${c.id}`);
      const yEl=document.getElementById(`xyy-${u.id}-${c.id}`);
      if(dot){dot.style.left=px+'px';dot.style.top=py+'px';}
      if(rip){rip.style.left=px+'px';rip.style.top=py+'px';}
      if(xEl) xEl.textContent=Math.round(xv);
      if(yEl) yEl.textContent=Math.round(yv);
      logSig(u.id,c.label,`${Math.round(xv)}, ${Math.round(yv)}`,c.color||'#fff');
    };
    pad.addEventListener('mousedown', e => {
      move(e);
      const onMove=e2=>move(e2);
      const onUp=()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
      window.addEventListener('mousemove',onMove); window.addEventListener('mouseup',onUp);
      e.preventDefault();
    });
  }
}

/* ═══ VALUE MUTATION ══════════════════════════════════ */

function setValue(u, c, raw) {
  const v = Math.round(raw*10)/10;
  SG[u.id][c.id] = v;
  updateVisual(u.id, c, v);
  checkConditions(u.id, c.id, v, c.color);
  logSig(u.id, c.label, v, c.color||'#fff');
}

function updateVisual(uid, c, v) {
  if (c.type === 'knob') {
    const pct=(v-c.min)/(c.max-c.min);
    const angle=-145+pct*290;
    const {pathD} = arcPaths(angle);
    const rotor=document.getElementById(`kr-${uid}-${c.id}`);
    const arc=document.getElementById(`karc-${uid}-${c.id}`);
    const val=document.getElementById(`kv-${uid}-${c.id}`);
    if(rotor) rotor.style.transform=`rotate(${angle}deg)`;
    if(arc)   arc.setAttribute('d',pathD);
    if(val)   val.textContent=v.toFixed(1);
  }
  if (c.type === 'fader') {
    const pct=(v-c.min)/(c.max-c.min);
    const col = c.id==='health'?(v>60?'#7fd4c8':v>30?'#f98f3b':'#d45b5b'):
                c.id==='infectionCount'?(v>30?'#d45b5b':v>15?'#f98f3b':'#9b7fd4'):c.color;
    const fill=document.getElementById(`ff-${uid}-${c.id}`);
    const thumb=document.getElementById(`fth-${uid}-${c.id}`);
    const val=document.getElementById(`fv-${uid}-${c.id}`);
    if(fill){fill.style.height=pct*100+'%';fill.style.background=`linear-gradient(to top,${col}99,${col})`;}
    if(thumb) thumb.style.bottom=`calc(${pct*100}% - 6px)`;
    if(val){val.textContent=Math.round(v);val.style.color=col;}
  }
}

function toggleCtrl(uid, cid) {
  const v = !SG[uid][cid];
  SG[uid][cid] = v;
  const u=UNITS.find(u=>u.id===uid), c=u?.controls.find(c=>c.id===cid);
  const btn=document.getElementById(`tg-${uid}-${cid}`);
  const state=document.getElementById(`ts-${uid}-${cid}`);
  if(btn){
    btn.classList.toggle('on',v);
    if(v){ btn.style.background=`rgba(${c?.rgb},.12)`;btn.style.borderColor=`rgba(${c?.rgb},.4)`; }
    else { btn.style.background='';btn.style.borderColor=''; }
    const thumb=btn.querySelector('.toggle-thumb');
    if(thumb){thumb.style.transform=v?'translateX(24px)':'';thumb.style.background=v?`rgb(${c?.rgb})`:'';}}
  if(state){state.textContent=v?'ON':'OFF';state.style.color=v?(c?.onColor||'var(--led-green)'):'rgba(255,255,255,.25)';}
  if(v && cid==='claustrophobia') sigFire('MODIFIER: CLAUSTROPHOBIA','Combat −30%, resolve −2, panic +15%','#d45b5b');
  if(v && cid==='critical') sigFire('VIRUS CRITICAL','Radius doubling — spread accelerating','#9b7fd4');
  logSig(uid,c?.label||cid,v?'ON':'OFF',c?.onColor||'#fff');
}

function checkConditions(uid, cid, v) {
  if(uid==='kael'    && cid==='fear'           && v>7)  sigFire('CLAUSTROPHOBIA RISK',`Kael fear ${v.toFixed(1)} > 7 — panic check imminent`,'#d45b5b');
  if(uid==='kael'    && cid==='health'         && v<30) sigFire('KAEL: CRITICAL HP',`Health ${Math.round(v)} — character at risk`,'#d45b5b');
  if(uid==='plague'  && cid==='infectionCount' && v>=10){ sigFire('VIRUS_SPREAD CRITICAL',`${Math.round(v)} NPCs infected — threshold crossed`,'#d45b5b'); autoSetCritical(true); }
  if(uid==='plague'  && cid==='infectionCount' && v<10)   autoSetCritical(false);
  if(uid==='world'   && cid==='factionTension' && v>70) sigFire('FACTION_SHIFT IMMINENT',`Tension ${Math.round(v)} > 70 — conflict threshold`,'#f98f3b');
}

function autoSetCritical(on) {
  SG.plague.critical=on;
  const c=UNITS.find(u=>u.id==='plague')?.controls.find(c=>c.id==='critical');
  const btn=document.getElementById('tg-plague-critical');

  if(state){ state.textContent=on?'ON':'OFF'; state.style.color=on?'#d45b5b':'rgba(255,255,255,.25)'; }
}

/* ═══ SEQUENCER ═══════════════════════════════════════ */
function toggleStep(uid,cid,i,color) {
  const k=uid+cid; if(!seqStates[k]) seqStates[k]=Array(16).fill(0);
  seqStates[k][i]=seqStates[k][i]?0:1;
  SG[uid][cid]=[...seqStates[k]];
  const s=document.getElementById(`ss-${uid}-${cid}-${i}`);
  if(s){
    const on=seqStates[k][i];
    s.classList.toggle('on',!!on);
    s.style.background=on?color+'44':'rgba(0,0,0,.5)';
    s.style.borderColor=on?color:'rgba(255,255,255,.08)';
    s.style.boxShadow=on?`0 0 6px ${color}`:'';
  }
}
function toggleSeq(uid,cid,e,color) {
  e.stopPropagation();
  const k=uid+cid; const btn=document.getElementById(`sqplay-${uid}-${cid}`);
  if(seqIntervals[k]){ clearInterval(seqIntervals[k]); delete seqIntervals[k]; if(btn)btn.classList.remove('active'); return; }
  let step=0;
  seqIntervals[k]=setInterval(()=>{
    const prev=(step+15)%16;
    document.getElementById(`ss-${uid}-${cid}-${prev}`)?.classList.remove('current');
    document.getElementById(`ss-${uid}-${cid}-${step}`)?.classList.add('current');
    if(seqStates[k]?.[step]) sigFire(`SEQ STEP ${step+1}`,`${cid} — beat`,color);
    step=(step+1)%16;
  },60000/bpm/4);
  if(btn) btn.classList.add('active');
}
function clearSeq(uid,cid,color){
  const k=uid+cid; seqStates[k]=Array(16).fill(0); SG[uid][cid]=[...seqStates[k]];
  for(let i=0;i<16;i++){const s=document.getElementById(`ss-${uid}-${cid}-${i}`);if(s){s.classList.remove('on','current');s.style.background='rgba(0,0,0,.5)';s.style.borderColor='rgba(255,255,255,.08)';s.style.boxShadow='';}}
}
function randSeq(uid,cid,color){
  const k=uid+cid; seqStates[k]=Array(16).fill(0).map(()=>Math.random()>.55?1:0); SG[uid][cid]=[...seqStates[k]];
  for(let i=0;i<16;i++){
    const s=document.getElementById(`ss-${uid}-${cid}-${i}`);
    if(s){const on=seqStates[k][i];s.classList.toggle('on',!!on);s.style.background=on?color+'44':'rgba(0,0,0,.5)';s.style.borderColor=on?color:'rgba(255,255,255,.08)';s.style.boxShadow=on?`0 0 6px ${color}`:'';}}
  toast('⟳ Pattern randomized');
}

/* ═══ PATCH CABLE SYSTEM ══════════════════════════════ */
let patchSrc=null;
const patches=[];

function patchStart(e,uid,idx,color,name) {
  e.preventDefault(); e.stopPropagation();
  const sock=document.getElementById(`js-out-${uid}-${idx}`);
  if(!sock) return;
  const lr=document.getElementById('patch-layer').getBoundingClientRect();
  const sr=sock.getBoundingClientRect();
  const srcType = IO[uid]?.outputs?.[idx]?.type || 'ANY';
  patchSrc={uid,idx,color,name,type:srcType,x:sr.left+sr.width/2-lr.left,y:sr.top+sr.height/2-lr.top};
  sock.classList.add('patching-src');
  // Highlight compatible input jacks
  document.querySelectorAll('[id^="js-in-"]').forEach(el => {
    const [,,tuid,tidx] = el.id.split('-');
    const inJack = IO[tuid]?.inputs?.[parseInt(tidx)];
    if (!inJack) return;
    const compatible = srcType === 'ANY' || inJack.type === 'ANY' ||
      inJack.type === srcType ||
      inJack.color === color;
    el.classList.add(compatible ? 'compatible' : 'incompatible');
  });
  const tmp=document.getElementById('cable-temp');
  tmp.style.display='block'; tmp.setAttribute('stroke',color);
  tmp.setAttribute('d',`M${patchSrc.x},${patchSrc.y} Q${patchSrc.x},${patchSrc.y} ${patchSrc.x},${patchSrc.y}`);
  document.getElementById('patch-layer').classList.add('active');
  toast(`Drag to a compatible INPUT jack (${srcType}) — ESC to cancel`);
}

function patchDrop(toUid,toIdx) {
  if(!patchSrc) return;
  if(patchSrc.uid===toUid){ patchCancel(); return; }
  const {uid:fromUid,idx:fromIdx,color,name}=patchSrc;
  patches.push({fromUid,fromIdx,toUid,toIdx,color,name});
  drawCable(fromUid,fromIdx,toUid,toIdx,color,name);
  const os=document.getElementById(`js-out-${fromUid}-${fromIdx}`);
  const is=document.getElementById(`js-in-${toUid}-${toIdx}`);
  if(os){os.classList.remove('patching-src');os.classList.add('connected');os.style.setProperty('--jack-color',color);}
  if(is){is.classList.add('connected');is.style.setProperty('--jack-color',color);}
  const fromName=IO[fromUid]?.outputs?.[fromIdx]?.name||name;
  const toName=IO[toUid]?.inputs?.[toIdx]?.name||'input';
  sigFire(`PATCHED`,`${fromUid}:${fromName} → ${toUid}:${toName}`,color);
  toast(`✓ ${fromName} → ${toName}`);
  patchCleanup();
}

function drawCable(fromUid,fromIdx,toUid,toIdx,color,name) {
  const lr=document.getElementById('patch-layer').getBoundingClientRect();
  const os=document.getElementById(`js-out-${fromUid}-${fromIdx}`);
  const is=document.getElementById(`js-in-${toUid}-${toIdx}`);
  if(!os||!is) return;
  const r1=os.getBoundingClientRect(), r2=is.getBoundingClientRect();
  const x1=r1.left+r1.width/2-lr.left, y1=r1.top+r1.height/2-lr.top;
  const x2=r2.left+r2.width/2-lr.left, y2=r2.top+r2.height/2-lr.top;
  // Catenary-ish cubic bezier: control points pulled down
  const droop=Math.abs(y2-y1)*0.5+40;
  const cx1=x1, cy1=y1+droop, cx2=x2, cy2=y2+droop;
  const g=document.getElementById('cables-permanent');
  const pid=`cable-${fromUid}-${fromIdx}-${toUid}-${toIdx}`;

  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.id=pid; path.className.baseVal='cable-path';
  path.setAttribute('stroke',color);
  path.setAttribute('d',`M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`);
  path.setAttribute('filter','url(#cable-glow)');
  path.style.cursor='pointer';
  path.addEventListener('contextmenu',ev=>{
    ev.preventDefault();
    g.contains(path)&&g.removeChild(path);
    const ti=document.getElementById(`clbl-${pid}`); ti&&g.contains(ti)&&g.removeChild(ti);
    const pi=patches.findIndex(p=>p.fromUid===fromUid&&p.fromIdx===fromIdx&&p.toUid===toUid&&p.toIdx===toIdx);
    if(pi>=0) patches.splice(pi,1);
    document.getElementById(`js-out-${fromUid}-${fromIdx}`)?.classList.remove('connected');
    document.getElementById(`js-in-${toUid}-${toIdx}`)?.classList.remove('connected');
    if(!patches.length) document.getElementById('patch-layer').classList.remove('has-cables');
    toast('✕ Cable removed');
  });
  g.appendChild(path);
  document.getElementById('patch-layer').classList.add('has-cables');

  const mx=(x1+x2)/2, my=Math.min(y1,y2)-(Math.abs(y2-y1)*0.1+8);
  const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
  lbl.id=`clbl-${pid}`;
  lbl.setAttribute('x',mx);lbl.setAttribute('y',my);
  lbl.setAttribute('text-anchor','middle');lbl.setAttribute('font-family','Orbitron,monospace');
  lbl.setAttribute('font-size','8');lbl.setAttribute('letter-spacing','1.5');
  lbl.setAttribute('fill',color);lbl.setAttribute('opacity','.6');
  lbl.setAttribute('pointer-events','none');
  lbl.textContent=name;
  g.appendChild(lbl);
}

function rebuildCables() {
  document.getElementById('cables-permanent').innerHTML='';
  patches.forEach(p=>drawCable(p.fromUid,p.fromIdx,p.toUid,p.toIdx,p.color,p.name));
}

function patchCancel() {
  if(patchSrc){ document.getElementById(`js-out-${patchSrc.uid}-${patchSrc.idx}`)?.classList.remove('patching-src'); }
  patchCleanup();
}
function patchCleanup() {
  patchSrc=null;
  const t=document.getElementById('cable-temp'); if(t) t.style.display='none';
  document.getElementById('patch-layer').classList.remove('active');
  document.querySelectorAll('.compatible,.incompatible').forEach(el=>{
    el.classList.remove('compatible','incompatible');
  });
}

document.addEventListener('mousemove',e=>{
  if(!patchSrc) return;
  const lr=document.getElementById('patch-layer').getBoundingClientRect();
  const ex=e.clientX-lr.left, ey=e.clientY-lr.top;
  const {x:sx,y:sy,color}=patchSrc;
  const droop=Math.abs(ey-sy)*0.5+30;
  document.getElementById('cable-temp').setAttribute('d',`M${sx},${sy} C${sx},${sy+droop} ${ex},${ey+droop} ${ex},${ey}`);
});
document.addEventListener('mouseup',e=>{
  if(!patchSrc) return;
  // Try direct target first, then probe under cursor (patch-layer may intercept)
  const directJack = e.target.closest('[id^="js-in-"]');
  if(directJack){
    const [,,toUid,toIdxStr]=directJack.id.split('-');
    patchDrop(toUid,parseInt(toIdxStr));
    return;
  }
  // elementFromPoint under the SVG layer
  const pl=document.getElementById('patch-layer');
  pl.style.pointerEvents='none';
  const el=document.elementFromPoint(e.clientX,e.clientY);
  pl.style.pointerEvents='';
  const jackEl=el?.closest('[id^="js-in-"]');
  if(jackEl){
    const [,,toUid,toIdxStr]=jackEl.id.split('-');
    patchDrop(toUid,parseInt(toIdxStr));
  } else {
    patchCancel();
  }
});
document.addEventListener('keydown',e=>{ if(e.key==='Escape') patchCancel(); });
window.addEventListener('resize',()=>setTimeout(rebuildCables,50));

/* ═══ TRANSPORT ═══════════════════════════════════════ */
function togglePlay(){
  playing=!playing;
  const btn=document.getElementById('t-play');
  btn.classList.toggle('playing',playing);
  btn.textContent=playing?'⏸':'▶';
  if(playing){ transportInt=setInterval(tickBeat,60000/bpm/4); toast('▶ Performance started'); }
  else { clearInterval(transportInt); toast('⏸ Paused'); }
}
function stopPlayback(){ playing=false; beat=0; clearInterval(transportInt); document.getElementById('t-play').classList.remove('playing'); document.getElementById('t-play').textContent='▶'; document.getElementById('t-beat').textContent='01.01.000'; }
function tickBeat(){ beat++; const bar=Math.floor(beat/16)+1,step=Math.floor(beat/4)%4+1,tick=(beat%4)*250; document.getElementById('t-beat').textContent=`${String(bar).padStart(2,'0')}.0${step}.${String(tick).padStart(3,'0')}`; }
function setBPM(v){ bpm=parseInt(v); document.getElementById('bpm-val').textContent=bpm; if(playing){clearInterval(transportInt);transportInt=setInterval(tickBeat,60000/bpm/4);} }

/* ═══ SIGNAL LOG ══════════════════════════════════════ */
const sigLog=[];
function sigFire(ch,desc,color) {
  sigLog.unshift({ch,desc,color,t:Date.now()});
  if(sigLog.length>12) sigLog.pop();
  renderInfo();
}
function logSig(uid,label,val,color) {
  sigLog.unshift({ch:`${uid.toUpperCase()}:${label}`,desc:`→ ${typeof val==='boolean'?(val?'ON':'OFF'):(Math.round(typeof val==='number'?val*10:0)/10)}`,color,t:Date.now()});
  if(sigLog.length>12) sigLog.pop();
  renderInfo();
}
function renderInfo() {
  const body=document.getElementById('ip-body');
  const count=document.getElementById('sig-count');
  count.textContent=sigLog.length+' signals';
  body.innerHTML=`<div style="display:flex;flex-direction:column;gap:5px">
    <div class="ip-sec-lbl">Subgraph State</div>
    ${Object.entries(SG).map(([uid,vals])=>`
      <div style="margin-bottom:5px">
        <div style="font-family:var(--fm);font-size:.44rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:2px">${uid.toUpperCase()}</div>
        ${Object.entries(vals).filter(([k,v])=>typeof v!=='object').slice(0,4).map(([k,v])=>`
          <div class="ip-row">
            <div class="ip-key">${k}</div>
            <div class="ip-val" style="color:${typeof v==='boolean'?(v?'var(--led-green)':'rgba(255,255,255,.25)'):'rgba(255,255,255,.7)'}">${typeof v==='boolean'?(v?'TRUE':'false'):v}</div>
          </div>`).join('')}
      </div>`).join('')}
    <div class="ip-sec-lbl" style="margin-top:6px">Signal Log</div>
    ${sigLog.slice(0,8).map(s=>`
      <div class="ip-signal" style="border-color:${s.color}44;background:${s.color}08">
        <div class="ip-signal-dot" style="background:${s.color}"></div>
        <div style="flex:1;min-width:0">
          <div style="font-family:var(--fm);font-size:.46rem;letter-spacing:.1em;text-transform:uppercase;color:${s.color};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.ch}</div>
          <div class="ip-signal-txt">${s.desc}</div>
        </div>
        <div class="ip-signal-time">${new Date(s.t).toLocaleTimeString()}</div>
      </div>`).join('')}
  </div>`;
}

/* ═══ TOAST ═══════════════════════════════════════════ */
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.remove('show');
  void el.offsetWidth; el.classList.add('show');
}

/* ═══ AI ORB — LOOM AI ASSISTANT ═════════════════════ */
let _aiOpen = false;
let _aiIdle = null;
const AI_IDLE_MS = 7000;

function toggleAIPanel() {
  _aiOpen = !_aiOpen;
  document.getElementById('ai-panel').classList.toggle('open', _aiOpen);
  document.getElementById('ai-orb').classList.toggle('active', _aiOpen);
  if (_aiOpen) { resetAIIdle(); document.getElementById('ai-input')?.focus(); }
  else clearTimeout(_aiIdle);
}

function resetAIIdle() {
  clearTimeout(_aiIdle);
  _aiIdle = setTimeout(() => { if (_aiOpen) toggleAIPanel(); }, AI_IDLE_MS);
}

document.getElementById('ai-input')?.addEventListener('input', resetAIIdle);
document.getElementById('ai-input')?.addEventListener('keydown', e => {
  resetAIIdle();
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); aiSend(); }
});

const AI_TEMPLATES = {
  fill:  () => `I'm looking at the Instrument Rack. Current state: resolve=${SG.kael?.resolve}, fear=${SG.kael?.fear}, health=${SG.kael?.health}, infectionCount=${SG.plague?.infectionCount}. Suggest optimal values for each knob/fader to create a dramatic confrontation scene.`,
  plot:  () => `Based on this narrative state — Kael fear:${SG.kael?.fear}/10, plague infections:${SG.plague?.infectionCount}, faction tension:${SG.world?.factionTension}% — suggest 3 concise plot developments (one sentence each).`,
  glyph: () => `Generate a new heraldic glyph for the Ashfall Swamp zone. Give me: name, a single emoji icon, world_logic effect (one sentence), and a lore snippet (two sentences). Format as JSON.`,
  arc:   () => `Kael Voryn: fear=${SG.kael?.fear}/10, resolve=${SG.kael?.resolve}/10, health=${SG.kael?.health}. Suggest a 3-chapter character arc with an emotional turning point. Be specific about scene beats.`,
};

function aiAction(type) {
  const input = document.getElementById('ai-input');
  if (input) { input.value = AI_TEMPLATES[type]?.() || ''; input.focus(); }
  resetAIIdle();
}

async function aiSend() {
  const input  = document.getElementById('ai-input');
  const output = document.getElementById('ai-output');
  const status = document.getElementById('ai-status');
  const prompt = input?.value.trim();
  if (!prompt) return;

  status.textContent = '⏳ Thinking…';
  status.style.color = 'var(--led-amber)';
  if (output) { output.textContent = ''; output.classList.add('streaming'); }
  resetAIIdle();

  // Try LoomLLM in parent scope (hub has it loaded)
  const LLM = window.parent?.LoomLLM || window.LoomLLM;
  if (LLM?.stream) {
    try {
      let text = '';
      await LLM.stream(
        [{ role: 'system', content: 'You are a narrative assistant for Quantum Loom, a story+music DAW. Be concise and creative.' },
         { role: 'user',   content: prompt }],
        chunk => {
          text += chunk;
          if (output) output.textContent = text;
          resetAIIdle();
        }
      );
      status.textContent = '✓ Done';
      status.style.color = 'var(--led-green)';
      if (output) output.classList.remove('streaming');
      return;
    } catch(e) {
      status.textContent = '✗ LLM error';
      status.style.color = 'var(--blood)';
      if (output) { output.textContent = e.message; output.classList.remove('streaming'); }
      return;
    }
  }

  // Fallback: route request to hub via postMessage
  try {
    window.parent?.postMessage({
      source: 'quantum-loom',
      type:   'AI_REQUEST',
      data:   { prompt, context: { kael: SG.kael, plague: SG.plague, world: SG.world }, requestId: '_rack_' + Date.now() }
    }, '*');
    if (output) output.textContent = '[ Sent to Loom hub — configure an AI provider in Settings for inline responses ]';
    status.textContent = 'Sent';
    status.style.color = 'var(--venturan)';
    if (output) output.classList.remove('streaming');
  } catch(e) {
    status.textContent = '✗ Error';
    status.style.color = 'var(--blood)';
    if (output) { output.textContent = e.message; output.classList.remove('streaming'); }
  }
}

// Receive AI responses streamed back from the hub
window.addEventListener('message', e => {
  if (!e.data || e.data.source !== 'quantum-vault') return;
  if (e.data.type === 'AI_RESPONSE') {
    const output = document.getElementById('ai-output');
    const status = document.getElementById('ai-status');
    if (output) output.textContent = e.data.data?.content || '(no response)';
    if (status) { status.textContent = '✓ Done'; status.style.color = 'var(--led-green)'; }
    if (!_aiOpen) toggleAIPanel();
    resetAIIdle();
  }
});

/* ── Quantum Loom Theme System ──────────────────────────────── */
(function initQLTheme() {
  const MAP = {
    'c-bg'     :'--rack-bg',
    'c-panel'  :'--panel-dark',
    'c-surf'   :'--panel-face',
    'c-surf2'  :'--panel-mid',
    'c-surf3'  :'--panel-hi',
    'c-accent1':'--venturan',
    'c-accent2':'--amber',
    'c-accent3':'--emerald',
    'c-accent4':'--fusion',
    'c-danger' :'--blood',
    'c-warm'   :'--solari'
  };
  function applyTokens(tokens) {
    const root = document.documentElement;
    Object.entries(MAP).forEach(([canonical, varName]) => {
      if (tokens[canonical] !== undefined)
        root.style.setProperty(varName, tokens[canonical]);
    });
    // Derive --panel-dark from bg if not explicitly provided
    if (tokens['c-bg'] && !tokens['c-panel'])
      root.style.setProperty('--panel-dark', tokens['c-bg']);
  }
  // Apply saved theme on load
  try {
    const saved = JSON.parse(localStorage.getItem('ql-theme') || '{}');
    if (saved.tokens) applyTokens(saved.tokens);
  } catch(e) {}
  // Listen for live theme broadcasts from hub
  window.addEventListener('message', e => {
    if (e.data?.type === 'ql:theme' && e.data.tokens)
      applyTokens(e.data.tokens);
  });
})();
