<!DOCTYPE html>
<html>
<head>
<title>Quantum Loom</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@300;400;600&family=Share+Tech+Mono&display=swap');
  body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background-color:#0d0a0f;overflow:hidden}
  .ql-viewport{width:800px;height:600px;background:#050208;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;font-family:'Rajdhani','Trebuchet MS',sans-serif;box-shadow:0 10px 30px rgba(0,0,0,0.5),0 0 0 1px rgba(220,60,120,0.1);cursor:pointer}
  .thread-grid{position:absolute;inset:0;background-image:linear-gradient(45deg,rgba(220,60,120,0.12) 1px,transparent 1px),linear-gradient(-45deg,rgba(220,60,120,0.12) 1px,transparent 1px);background-size:36px 36px;animation:threadShimmer 9s ease-in-out infinite}
  @keyframes threadShimmer{0%,100%{opacity:0.7}50%{opacity:1}}
  .radial-mask{position:absolute;inset:0;background:radial-gradient(ellipse 65% 65% at 50% 50%,transparent 25%,#050208 82%)}
  .ch-h{position:absolute;top:50%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(220,60,120,0.2) 30%,rgba(220,60,120,0.2) 70%,transparent);transform:translateY(-50%)}
  .ch-v{position:absolute;left:50%;top:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,rgba(220,60,120,0.2) 30%,rgba(220,60,120,0.2) 70%,transparent);transform:translateX(-50%)}
  .thread-svg{position:absolute;inset:0;width:100%;height:100%;opacity:0.55}
  .loom-ring{position:absolute;border-radius:50%;border:1px solid rgba(220,60,120,0.25);animation:loomRipple 5s ease-out infinite}
  .lr1{width:130px;height:130px;animation-delay:0s}
  .lr2{width:240px;height:240px;animation-delay:1.6s;border-color:rgba(220,60,120,0.18)}
  .lr3{width:360px;height:360px;animation-delay:3.2s;border-color:rgba(220,60,120,0.12)}
  @keyframes loomRipple{0%{transform:scale(0.5);opacity:0.9;top:calc(50% - 65px);left:calc(50% - 65px)}100%{transform:scale(1.6);opacity:0;top:calc(50% - 104px);left:calc(50% - 104px)}}
  .filament{position:absolute;height:1px;background:linear-gradient(90deg,transparent,rgba(220,60,120,0.7),transparent);animation:filamentDrift linear infinite;transform-origin:left center}
  @keyframes filamentDrift{0%{transform:translateY(0) scaleX(0);opacity:0}10%{opacity:1;transform:translateY(0) scaleX(1)}90%{opacity:0.8}100%{transform:translateY(-600px) scaleX(0.3);opacity:0}}
  .f1{width:120px;left:15%;bottom:20%;animation-duration:7s;animation-delay:0s;transform:rotate(-15deg)}
  .f2{width:80px;left:65%;bottom:30%;animation-duration:9s;animation-delay:2s;transform:rotate(20deg)}
  .f3{width:100px;left:40%;bottom:10%;animation-duration:6s;animation-delay:4s;transform:rotate(-8deg)}
  .f4{width:60px;left:80%;bottom:25%;animation-duration:8s;animation-delay:1s;transform:rotate(30deg)}
  .f5{width:90px;left:5%;bottom:15%;animation-duration:10s;animation-delay:3s;transform:rotate(-25deg)}
  .ql-seal{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:18px;transform:translateY(-18px);animation:loomReveal 1.8s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;opacity:0}
  @keyframes loomReveal{0%{opacity:0;transform:translateY(calc(-18px + 12px)) scale(0.9)}100%{opacity:1;transform:translateY(-18px) scale(1)}}
  .loom-emblem{width:100px;height:100px;position:relative;display:flex;align-items:center;justify-content:center}
  .loom-core{position:absolute;width:18px;height:18px;border-radius:50%;background:radial-gradient(circle,#ff6090,#dc3c78);box-shadow:0 0 20px #dc3c78,0 0 40px rgba(220,60,120,0.6);animation:loomCorePulse 2s ease-in-out infinite;z-index:2}
  @keyframes loomCorePulse{0%,100%{transform:scale(1);box-shadow:0 0 20px #dc3c78,0 0 40px rgba(220,60,120,0.5)}50%{transform:scale(1.25);box-shadow:0 0 30px #ff6090,0 0 60px rgba(220,60,120,0.8)}}
  .loom-hex{position:absolute;width:74px;height:74px;border:1.5px solid rgba(220,60,120,0.55);clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);animation:hexGlow 3s ease-in-out infinite}
  @keyframes hexGlow{0%,100%{box-shadow:0 0 12px rgba(220,60,120,0.2);border-color:rgba(220,60,120,0.55)}50%{box-shadow:0 0 28px rgba(220,60,120,0.5);border-color:rgba(255,96,144,0.9)}}
  .loom-spinner{position:absolute;width:50px;height:50px;border-radius:50%;border:1px solid transparent;border-top-color:rgba(220,60,120,0.7);border-right-color:rgba(220,60,120,0.2);animation:spinCW 6s linear infinite}
  .loom-spinner2{position:absolute;width:36px;height:36px;border-radius:50%;border:1px solid transparent;border-bottom-color:rgba(255,150,180,0.5);border-left-color:rgba(255,150,180,0.15);animation:spinCW 4s linear infinite reverse}
  @keyframes spinCW{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .orbit-dot{position:absolute;width:56px;height:56px;border-radius:50%;animation:spinCW 6s linear infinite}
  .orbit-dot::after{content:'';position:absolute;top:-3px;left:50%;width:6px;height:6px;background:#ff6090;border-radius:50%;margin-left:-3px;box-shadow:0 0 8px #ff6090,0 0 16px rgba(220,60,120,0.5)}
  .od2{animation-direction:reverse;animation-delay:-3s}
  .od2::after{top:auto;bottom:-3px;background:#c8a0ff;box-shadow:0 0 8px #c8a0ff}
  .ql-wordmark{text-align:center;animation:wordIn 1.5s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;opacity:0}
  @keyframes wordIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
  .ql-quantum{font-family:'Cinzel','Georgia',serif;font-size:13px;font-weight:400;color:rgba(220,60,120,0.65);letter-spacing:0.55em;text-transform:uppercase;display:block;margin-bottom:2px}
  .ql-loom{font-family:'Cinzel','Georgia',serif;font-size:52px;font-weight:700;line-height:1;letter-spacing:0.08em;display:block;background:linear-gradient(135deg,#ff90b8,#dc3c78 45%,#8820a0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(220,60,120,0.5))}
  .bottom-info{position:absolute;top:75%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:14px;z-index:10;animation:bottomReveal 1s ease 1.1s forwards;opacity:0}
  @keyframes bottomReveal{from{opacity:0;transform:translate(-50%,calc(-50% + 8px))}to{opacity:1;transform:translate(-50%,-50%)}}
  .ql-tagline-row{display:flex;align-items:center;gap:10px}
  .ql-line{height:1px;width:36px;background:linear-gradient(90deg,transparent,rgba(220,60,120,0.4))}
  .ql-line.right{background:linear-gradient(90deg,rgba(220,60,120,0.4),transparent)}
  .ql-tagline{font-size:11px;color:rgba(220,60,120,0.45);letter-spacing:0.3em;text-transform:uppercase}
  .loom-status{display:flex;gap:18px}
  .ls-item{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono','Courier New',monospace;font-size:9px;color:rgba(220,60,120,0.45);letter-spacing:0.1em;text-transform:uppercase}
  .ls-pip{width:5px;height:5px;border-radius:50%;background:#dc3c78;box-shadow:0 0 6px #dc3c78;animation:pipBlink 2s ease-in-out infinite}
  .ls-pip.lavender{background:#c8a0ff;box-shadow:0 0 6px #c8a0ff;animation-delay:0.6s}
  .ls-pip.dim{background:rgba(220,60,120,0.25);box-shadow:none;animation:none}
  @keyframes pipBlink{0%,100%{opacity:1}50%{opacity:0.3}}
  .lcm{position:absolute;width:22px;height:22px;opacity:0.35}
  .lcm-tl{top:14px;left:14px;border-top:1px solid #dc3c78;border-left:1px solid #dc3c78}
  .lcm-tr{top:14px;right:14px;border-top:1px solid #dc3c78;border-right:1px solid #dc3c78}
  .lcm-bl{bottom:14px;left:14px;border-bottom:1px solid #dc3c78;border-left:1px solid #dc3c78}
  .lcm-br{bottom:14px;right:14px;border-bottom:1px solid #dc3c78;border-right:1px solid #dc3c78}
  .lfrag{position:absolute;font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(220,60,120,0.35);letter-spacing:0.05em;animation:fragDrift 10s ease-in-out infinite;user-select:none}
  @keyframes fragDrift{0%,100%{opacity:0.35;transform:translateY(0)}50%{opacity:0.6;transform:translateY(-10px)}}
  .lf1{top:12%;left:5%;animation-delay:0s}
  .lf2{top:20%;right:6%;animation-delay:1.5s}
  .lf3{bottom:22%;left:7%;animation-delay:3s}
  .lf4{bottom:15%;right:5%;animation-delay:2s}
  .lf5{top:60%;left:4%;animation-delay:4s}
  .lf6{top:42%;right:5%;animation-delay:1s}
  .ql-version{position:absolute;bottom:18px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.2em;color:rgba(220,60,120,0.3);text-transform:uppercase}
  /* Click hint */
  .click-hint{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.25em;color:rgba(220,60,120,0.4);text-transform:uppercase;animation:hintPulse 2s ease-in-out infinite;opacity:0;animation-delay:3s;animation-fill-mode:forwards}
  @keyframes hintPulse{0%,100%{opacity:0.3}50%{opacity:0.7}}
  .fade-out{animation:fadeOut 0.8s ease forwards !important}
  @keyframes fadeOut{to{opacity:0}}
</style>
</head>
<body>
<div class="ql-viewport" id="splash">
  <div class="thread-grid"></div>
  <div class="radial-mask"></div>
  <div class="ch-h"></div><div class="ch-v"></div>
  <div class="lcm lcm-tl"></div><div class="lcm lcm-tr"></div>
  <div class="lcm lcm-bl"></div><div class="lcm lcm-br"></div>
  <svg class="thread-svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
    <defs><filter id="glow"><feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/><feFlood flood-color="rgba(255,96,144,0.7)" result="flood"/><feComposite in="flood" in2="blur" operator="atop" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    <line x1="400" y1="300" x2="100" y2="80"  stroke="rgba(220,60,120,0.7)"  stroke-width="1.2"/>
    <line x1="400" y1="300" x2="400" y2="30"  stroke="rgba(220,60,120,0.55)" stroke-width="1.2"/>
    <line x1="400" y1="300" x2="700" y2="80"  stroke="rgba(220,60,120,0.7)"  stroke-width="1.2"/>
    <line x1="400" y1="300" x2="760" y2="300" stroke="rgba(220,60,120,0.55)" stroke-width="1.2"/>
    <line x1="400" y1="300" x2="700" y2="520" stroke="rgba(220,60,120,0.7)"  stroke-width="1.2"/>
    <line x1="400" y1="300" x2="400" y2="570" stroke="rgba(220,60,120,0.55)" stroke-width="1.2"/>
    <line x1="400" y1="300" x2="100" y2="520" stroke="rgba(220,60,120,0.7)"  stroke-width="1.2"/>
    <line x1="400" y1="300" x2="40"  y2="300" stroke="rgba(220,60,120,0.55)" stroke-width="1.2"/>
    <line x1="400" y1="300" x2="220" y2="50"  stroke="rgba(200,120,200,0.45)" stroke-width="0.8"/>
    <line x1="400" y1="300" x2="580" y2="50"  stroke="rgba(200,120,200,0.45)" stroke-width="0.8"/>
    <line x1="400" y1="300" x2="720" y2="160" stroke="rgba(200,120,200,0.45)" stroke-width="0.8"/>
    <line x1="400" y1="300" x2="720" y2="440" stroke="rgba(200,120,200,0.45)" stroke-width="0.8"/>
    <line x1="400" y1="300" x2="580" y2="550" stroke="rgba(200,120,200,0.45)" stroke-width="0.8"/>
    <line x1="400" y1="300" x2="220" y2="550" stroke="rgba(200,120,200,0.45)" stroke-width="0.8"/>
    <line x1="400" y1="300" x2="80"  y2="440" stroke="rgba(200,120,200,0.45)" stroke-width="0.8"/>
    <line x1="400" y1="300" x2="80"  y2="160" stroke="rgba(200,120,200,0.45)" stroke-width="0.8"/>
    <circle cx="100" cy="80"  r="5" fill="rgba(220,60,120,0.8)" filter="url(#glow)"/>
    <circle cx="400" cy="30"  r="4" fill="rgba(220,60,120,0.7)"/>
    <circle cx="700" cy="80"  r="5" fill="rgba(220,60,120,0.8)"/>
    <circle cx="760" cy="300" r="4" fill="rgba(220,60,120,0.7)"/>
    <circle cx="700" cy="520" r="5" fill="rgba(220,60,120,0.8)"/>
    <circle cx="400" cy="570" r="4" fill="rgba(220,60,120,0.7)"/>
    <circle cx="100" cy="520" r="5" fill="rgba(220,60,120,0.8)"/>
    <circle cx="40"  cy="300" r="4" fill="rgba(220,60,120,0.7)"/>
    <circle cx="220" cy="50"  r="3.5" fill="rgba(200,140,255,0.8)"/>
    <circle cx="580" cy="50"  r="3.5" fill="rgba(200,140,255,0.8)"/>
    <circle cx="720" cy="160" r="3.5" fill="rgba(200,140,255,0.8)"/>
    <circle cx="720" cy="440" r="3.5" fill="rgba(200,140,255,0.8)"/>
    <circle cx="580" cy="550" r="3.5" fill="rgba(200,140,255,0.8)"/>
    <circle cx="220" cy="550" r="3.5" fill="rgba(200,140,255,0.8)"/>
    <circle cx="80"  cy="440" r="3.5" fill="rgba(200,140,255,0.8)"/>
    <circle cx="80"  cy="160" r="3.5" fill="rgba(200,140,255,0.8)"/>
  </svg>
  <span class="lfrag lf1">NODE::WEAVE</span>
  <span class="lfrag lf2">GRAPH.BUILD</span>
  <span class="lfrag lf3">THREAD::OK</span>
  <span class="lfrag lf4">LOOM.INIT</span>
  <span class="lfrag lf5">WIRE::LINK</span>
  <span class="lfrag lf6">MESH.SYNC</span>
  <div class="filament f1"></div><div class="filament f2"></div>
  <div class="filament f3"></div><div class="filament f4"></div>
  <div class="filament f5"></div>
  <div class="loom-ring lr1"></div>
  <div class="loom-ring lr2"></div>
  <div class="loom-ring lr3"></div>
  <div class="ql-seal">
    <div class="loom-emblem">
      <div class="loom-hex"></div>
      <div class="loom-spinner"></div>
      <div class="loom-spinner2"></div>
      <div class="orbit-dot"></div>
      <div class="orbit-dot od2"></div>
      <div class="loom-core"></div>
    </div>
    <div class="ql-wordmark">
      <span class="ql-quantum">Quantum</span>
      <span class="ql-loom">Loom</span>
    </div>
  </div>
  <div class="bottom-info">
    <div class="ql-tagline-row">
      <div class="ql-line"></div>
      <span class="ql-tagline">Narrative · Sequencer · Weaver</span>
      <div class="ql-line right"></div>
    </div>
    <div class="loom-status">
      <div class="ls-item"><div class="ls-pip"></div>Nodes</div>
      <div class="ls-item"><div class="ls-pip lavender"></div>Edges</div>
      <div class="ls-item"><div class="ls-pip"></div>Scenes</div>
      <div class="ls-item"><div class="ls-pip dim"></div>Canvas</div>
      <div class="ls-item"><div class="ls-pip"></div>Output</div>
    </div>
  </div>
  <div class="click-hint">· click anywhere to enter ·</div>
  <div class="ql-version">BioSpark Studios · Quantum Ecosystem</div>
</div>
<script>
  if (window.splashBridge) window.splashBridge.ready();
  document.getElementById('splash').addEventListener('click', () => {
    document.getElementById('splash').classList.add('fade-out');
    setTimeout(() => {
      if (window.splashBridge) window.splashBridge.dismiss();
    }, 800);
  });
</script>
</body>
</html>
