name: Build/Release
on:
  push:
    tags:
      - 'v1.0.0' # Triggers when you push a tag starting with 'v' (e.g., v1.0.0)

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        # This creates 3 parallel jobs: one for each OS
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Match your project's node version

      - name: Install dependencies
        run: npm install

      - name: Build and Release Electron App
        uses: samuelmeuli/action-electron-builder@v1
        with:
          # This action handles the packaging and uploading to GitHub Releases
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release: true
